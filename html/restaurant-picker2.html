<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provo Restaurant Picker</title>
    <style>

        /* ── Reset ──────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Page Layout ────────────────────────────────────── */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-align: center;
            color: #f5c518;
            text-shadow: 0 0 20px rgba(245, 197, 24, 0.4);
        }

        .subtitle {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
        }

        /* ── Wheel ──────────────────────────────────────────── */
        .wheel-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(245, 197, 24, 0.3), 0 0 80px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .center-circle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .arrow {
            position: absolute;
            right: -18px;
            width: 0;
            height: 0;
            border-top: 18px solid transparent;
            border-bottom: 18px solid transparent;
            border-right: 36px solid #f5c518;
            z-index: 10;
            filter: drop-shadow(0 0 6px rgba(245, 197, 24, 0.8));
        }

        /* ── Spin Button ────────────────────────────────────── */
        .spin-btn {
            background: linear-gradient(135deg, #f5c518, #e6a800);
            color: #1a1a2e;
            border: none;
            padding: 16px 60px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(245, 197, 24, 0.4);
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(245, 197, 24, 0.6);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* ── Result Display ─────────────────────────────────── */
        .result-container {
            margin-top: 25px;
            text-align: center;
            min-height: 80px;
        }

        .result-label {
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 12px;
        }

        .result-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: all 0.5s ease;
        }

        .result-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f5c518;
            text-shadow: 0 0 20px rgba(245, 197, 24, 0.5);
            transition: opacity 0.3s ease;
        }

        .result-name.fading {
            opacity: 0;
        }

        .result-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 50%;
            border: 3px solid #f5c518;
            box-shadow: 0 0 12px rgba(245, 197, 24, 0.4);
            background-color: white;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .result-logo.show {
            opacity: 1;
        }

        /* ── Navigation ─────────────────────────────────────── */
        .back-link {
            margin-top: 30px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #f5c518;
        }

    </style>
</head>
<body>

    <h1>🍽️ Provo Restaurant Picker</h1>
    <p class="subtitle">Can't decide where to eat? Let the wheel decide!</p>

    <div class="wheel-container">
        <canvas id="wheel" width="420" height="420"></canvas>
        <div class="center-circle"></div>
        <div class="arrow"></div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>

    <div class="result-container">
        <p class="result-label">Tonight you're eating at...</p>
        <div class="result-inner">
            <img class="result-logo" id="resultLogo" src="" alt="" style="display:none;">
            <div class="result-name" id="resultName"></div>
        </div>
    </div>

    <a href="../index.html" class="back-link">← Back to Duke Basketball</a>

    <script>

        // ── Configuration ─────────────────────────────────────
        const SPIN_DURATION  = 4000;  // milliseconds
        const MIN_ROTATIONS  = 4;     // full rotations before stopping

        const COLORS = [
            "#e63946", "#457b9d", "#2a9d8f", "#e9c46a",
            "#f4a261", "#264653", "#6d6875", "#b5838d", "#e76f51"
        ];

        // ── Restaurant List ───────────────────────────────────
        // Logo images are defined at the bottom of this file.
        const RESTAURANTS = [
            "Rancheritos",
            "Taco Bell",
            "BYU Creamery",
            "In-N-Out",
            "Cafe Rio",
            "Costa Vida",
            "Chick-fil-A",
            "Dave's Hot Chicken",
            "Little Caesar's"
        ];

        // ── Canvas Setup ──────────────────────────────────────
        const canvas      = document.getElementById("wheel");
        const ctx         = canvas.getContext("2d");
        const NUM_SEGMENTS = RESTAURANTS.length;
        const ARC          = (2 * Math.PI) / NUM_SEGMENTS;

        // ── State ─────────────────────────────────────────────
        let currentAngle = 0;
        let isSpinning   = false;

        // ── Draw Wheel ────────────────────────────────────────
        function drawWheel(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx     = canvas.width  / 2;
            const cy     = canvas.height / 2;
            const radius = canvas.width  / 2 - 5;

            for (let i = 0; i < NUM_SEGMENTS; i++) {
                const startAngle = angle + i * ARC;
                const endAngle   = startAngle + ARC;

                // Colored segment
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle   = COLORS[i % COLORS.length];
                ctx.fill();
                ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                ctx.lineWidth   = 2;
                ctx.stroke();

                // Restaurant name label
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(startAngle + ARC / 2);
                ctx.textAlign   = "right";
                ctx.fillStyle   = "white";
                ctx.font        = "bold 15px Segoe UI";
                ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                ctx.shadowBlur  = 4;
                ctx.fillText(RESTAURANTS[i], radius - 15, 6);
                ctx.restore();
            }
        }

        // ── Spin Wheel ────────────────────────────────────────
        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;

            const btn      = document.getElementById("spinBtn");
            const nameEl   = document.getElementById("resultName");
            const logoEl   = document.getElementById("resultLogo");

            // Hide the previous result while spinning
            btn.disabled = true;
            nameEl.classList.add("fading");
            logoEl.classList.remove("show");

            const totalRotation = (Math.random() * 360 + MIN_ROTATIONS * 360) * (Math.PI / 180);
            const startAngle    = currentAngle;
            const startTime     = performance.now();

            function animate(now) {
                const elapsed  = now - startTime;
                const progress = Math.min(elapsed / SPIN_DURATION, 1);
                const ease     = 1 - Math.pow(1 - progress, 4); // ease-out quartic

                currentAngle = startAngle + totalRotation * ease;
                drawWheel(currentAngle);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                    return;
                }

                // ── Spin complete: find the winning segment ──
                isSpinning   = false;
                btn.disabled = false;

                // Arrow sits at angle 0 on the right; map wheel rotation to segment index
                const normalized   = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                const relativeAngle = (2 * Math.PI - normalized) % (2 * Math.PI);
                const index         = Math.floor(relativeAngle / ARC) % NUM_SEGMENTS;
                const winner        = RESTAURANTS[index];

                // Show restaurant name
                nameEl.textContent = winner;
                nameEl.classList.remove("fading");

                // Show logo if one exists
                const logoUrl = RESTAURANT_IMAGES[winner];
                if (logoUrl) {
                    logoEl.src          = logoUrl;
                    logoEl.alt          = winner;
                    logoEl.style.display = "block";
                    setTimeout(() => logoEl.classList.add("show"), 50);
                } else {
                    logoEl.style.display = "none";
                }
            }

            requestAnimationFrame(animate);
        }

        // ── Init ──────────────────────────────────────────────
        drawWheel(currentAngle);
